name: grdl
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - numpy
  - scipy
  - matplotlib
  - h5py
  - xarray
  - rasterio
  - pyproj
  - shapely
  - scikit-image
  - numba
  - opencv
  - cartopy
  - glymur
  # Keep these in sync with pyproject.toml — unpinned conda specs let
  # an older sarkit/sarpy from the user-site silently shadow the env.
  # sarpy 2.0 is PyPI-only for now (not yet on conda-forge); see the pip section below.
  - sarkit>=1.3.0
  - requests
  - pyyaml
  - lxml
  - pyside6
  # Dev / testing
  - pytest
  - pytest-cov
  - pytest-benchmark
  - ruff
  - black
  - mypy
  # Pip-only packages (conda-forge builds broken on osx-arm64)
  - pip
  - pip:
    - spectral
    # sarpy 2.0 is not yet packaged on conda-forge (max 1.3.x) — install from PyPI
    - sarpy>=2.0.0
